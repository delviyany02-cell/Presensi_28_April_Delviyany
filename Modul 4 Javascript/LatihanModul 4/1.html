<!DOCTYPE html>
<html lang="en">
<head>
    <title>Latihan Manipulasi DOM</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #judul {
            color: steelblue;
            transition: 0.5s;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 id="judul">Selamat Datang di Praktikum JavaScript</h1>
    <button id="btnUbah" onclick="ubahTeks()">Ubah Teks Judul</button>
    <script>
        function ubahTeks() {
            var elemenJudul = document.getElementById("judul");
            elemenJudul.innerHTML = "Teks Berhasil Diubah!";
            elemenJudul.style.color = "crimson";
                       elemenJudul.style.fontSize = "60px";
                       elemenJudul.style.backgroundColor = "yellow";
                       elemenJudul.style.padding = "15px";
                       elemenJudul.style.borderRadius = "10px";

                       elemenJudul.style.fontWeight = "bold";
                       elemenJudul.style.textTransform = "uppercase";

            document.getElementById("btnUbah").disabled = true;
        }
    </script>
</body>
</html>
