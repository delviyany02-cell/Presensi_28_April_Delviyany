<!DOCTYPE html>
<!-- Menentukan bahwa ini adalah dokumen HTML5 -->

<html lang="id">
<!-- Tag utama HTML, lang="id" artinya bahasa Indonesia -->



<body>
<!-- Semua yang tampil di halaman -->

    <!-- ========================================================= -->
    <!-- ====================== BAGIAN HTML ======================= -->
    <!-- ============== Dibuat oleh: Delviyany ==================== -->
    <!-- ========================================================= -->

    <div class="container">
    <!-- Kotak utama -->

        <h2>← Manajemen Mahasiswa</h2>
        <!-- Judul halaman -->

        <form>
        <!-- Form untuk input data -->

            <div class="form-group">
                <!-- Input NIM dan Nama -->
                <input type="text" placeholder="NIM">
                <input type="text" placeholder="Nama Lengkap">
            </div>

            <textarea placeholder="Alamat"></textarea>
            <!-- Input alamat -->

            <div class="radio-group">
                <!-- Pilihan jenis kelamin -->
                <label><input type="radio" name="jk"> Pria</label>
                <label><input type="radio" name="jk"> Wanita</label>
            </div>

            <div class="form-group">
                <!-- Dropdown tanggal -->
                <select>
                    <option>Tgl</option>
                    <option>01</option>
                    <option>02</option>
                </select>

                <!-- Dropdown bulan -->
                <select>
                    <option>Bulan</option>
                    <option>Januari</option>
                    <option>Februari</option>
                </select>

                <!-- Dropdown tahun -->
                <select>
                    <option>Tahun</option>
                    <option>1980</option>
                    <option>2000</option>
                    <option>2020</option>
                </select>
            </div>

            <div class="form-group">
                <!-- Input password -->
                <input type="password" placeholder="Password">
            </div>

            <!-- Tombol aksi -->
            <button class="btn-submit">Submit</button>
            <button type="reset" class="btn-reset">Reset</button>

        </form>

        <hr>
        <!-- Garis pemisah -->

        <h3>Data Mahasiswa</h3>
        <!-- Judul tabel -->

        <table>
            <!-- Tabel data -->

            <thead>
                <tr>
                    <th>No</th>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>JK</th>
                    <th>Alamat</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>12345</td>
                    <td>Contoh Nama</td>
                    <td>Pria</td>
                    <td>Bontang</td>
                </tr>
            </tbody>

        </table>

    </div>

</body>
</html>
